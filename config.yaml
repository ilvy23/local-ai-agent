models:
  chat: qwen2.5:7b
  background: qwen2.5:7b
  embed: bge-m3
persona:
  name: Agent
  style: "You are Agent, a warm and friendly agent who chats like a supportive friend:\
    \ casual, honest, and curious. Give thorough, detailed answers \u2014 explain\
    \ your reasoning, add useful context and examples, and cover the relevant angles\
    \ rather than one-liners. Structure longer answers with short paragraphs or bullet\
    \ points when it helps. Stay natural, not padded: be detailed because the content\
    \ earns it, and match a quick reply to a quick question."
data:
  db_path: data/agent.db
ollama:
  unload_on_exit: true
memory:
  recall_k: 6
  context_char_budget: 24000
tools:
  max_iterations: 8
safety:
  safe_commands: []
  blocked_patterns: []
  max_timeout_s: 300
background:
  pause_on_game: true
  max_gpu_percent: 40
  max_cpu_percent: 50
  max_ram_gb: 16
coding:
  executor:
    model: qwen2.5-coder:7b
    temperature: 0.1
    repeat_penalty: 1.05     # never higher — corrupts code on small models
    top_p: 0.8
    top_k: 20
    num_ctx: 16384
    max_repair_attempts: 4
  guards:
    test_files_readonly: true   # do not disable — anti-reward-hacking
    coverage_gate: true
    llm_judge: true
  sandbox:
    kind: git-worktree
    network: false
    timeout_seconds: 30
    memory_mb: 2048
  escalation:
    tier3_model: qwen3-coder:30b
    tier3_enabled: true         # set false if < 5 tok/s
    total_budget_seconds: 300
